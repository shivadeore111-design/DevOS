name: Feature Request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Got an idea? We want to hear it."
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I keep having to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New tool
        - New skill
        - New provider
        - UX improvement
        - Performance
        - Security
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

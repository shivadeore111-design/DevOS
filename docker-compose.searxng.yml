# ============================================================
# DevOS — SearxNG Self-Hosted Search
# ============================================================
# Run: docker-compose -f docker-compose.searxng.yml up -d
# Stop: docker-compose -f docker-compose.searxng.yml down
# Logs: docker-compose -f docker-compose.searxng.yml logs -f

version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: devos-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET_KEY=devos-searxng-secret-change-in-prod
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - devos-search

networks:
  devos-search:
    driver: bridge

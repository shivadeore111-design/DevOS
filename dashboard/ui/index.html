<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOS Control Plane</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    .event-item { border-left: 3px solid transparent; }
    .event-success { border-color: #10b981; }
    .event-failure { border-color: #ef4444; }
    .event-running { border-color: #f59e0b; }
    .event-info    { border-color: #6366f1; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .slide-in { animation: slideIn 0.2s ease-out; }
    @keyframes slideIn { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Constants ──────────────────────────────────────────────────
const API = '';  // same origin

// ── Helpers ───────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleTimeString(); } catch { return ts; }
}
function fmtDuration(ms) {
  if (!ms) return '–';
  if (ms < 1000) return `${ms}ms`;
  return `${(ms/1000).toFixed(1)}s`;
}
function classifyEvent(type) {
  if (['goal_completed','step_completed','command_executed','agent_completed'].includes(type)) return 'success';
  if (['goal_failed','step_failed'].includes(type)) return 'failure';
  if (['step_started','goal_received','agent_spawned'].includes(type)) return 'running';
  return 'info';
}
function eventIcon(type) {
  const icons = {
    goal_received: '🎯', plan_created: '📋', step_started: '▶',
    command_executed: '⚡', step_failed: '❌', repair_attempt: '🔧',
    step_completed: '✅', goal_completed: '🏆', goal_failed: '💥',
    agent_spawned: '🤖', agent_completed: '✔', skill_executed: '🔩',
    memory_updated: '🧠',
  };
  return icons[type] || '•';
}
function statusColor(status) {
  const m = { completed:'text-green-400', failed:'text-red-400', running:'text-yellow-400',
               queued:'text-blue-400', claimed:'text-purple-400', escalated:'text-orange-400' };
  return m[status] || 'text-gray-400';
}
function statusBadge(status) {
  const m = { completed:'bg-green-900 text-green-300', failed:'bg-red-900 text-red-300',
               running:'bg-yellow-900 text-yellow-300', queued:'bg-blue-900 text-blue-300',
               claimed:'bg-purple-900 text-purple-300', escalated:'bg-orange-900 text-orange-300' };
  return `px-2 py-0.5 rounded text-xs font-medium ${m[status] || 'bg-gray-700 text-gray-300'}`;
}

// ── useAPI hook ────────────────────────────────────────────────
function useAPI(endpoint, interval = 0) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const fetchData = useCallback(async () => {
    try {
      const r = await fetch(API + endpoint);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      setData(await r.json());
      setError(null);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, [endpoint]);
  useEffect(() => {
    fetchData();
    if (interval > 0) {
      const id = setInterval(fetchData, interval);
      return () => clearInterval(id);
    }
  }, [fetchData, interval]);
  return { data, loading, error, refresh: fetchData };
}

// ── StatCard ──────────────────────────────────────────────────
function StatCard({ label, value, sub, color = 'text-white' }) {
  return (
    <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
      <div className="text-gray-400 text-xs uppercase tracking-wider mb-1">{label}</div>
      <div className={`text-3xl font-bold ${color}`}>{value ?? '–'}</div>
      {sub && <div className="text-gray-500 text-xs mt-1">{sub}</div>}
    </div>
  );
}

// ── Pages ──────────────────────────────────────────────────────

function DashboardPage() {
  const { data: health, loading: hLoading } = useAPI('/api/health', 10000);
  const { data: metrics, loading: mLoading } = useAPI('/api/metrics', 15000);
  const { data: tasks } = useAPI('/api/tasks', 15000);

  const recentCompleted = (tasks || []).filter(t => t.status === 'completed').slice(0, 5);

  return (
    <div className="space-y-6">
      <h2 className="text-2xl font-bold text-white">Dashboard</h2>

      {/* System Health */}
      <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
        <div className="text-gray-400 text-sm font-medium mb-3 uppercase tracking-wider">System Health</div>
        {hLoading ? <div className="text-gray-500 text-sm">Checking...</div> : (
          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2">
              <div className={`w-3 h-3 rounded-full ${health?.ollama ? 'bg-green-400' : 'bg-red-400'}`}></div>
              <span className="text-sm">Ollama {health?.ollama ? 'connected' : 'offline'}</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-green-400"></div>
              <span className="text-sm">DevOS v{health?.version || '4.0.0'}</span>
            </div>
          </div>
        )}
      </div>

      {/* Stats */}
      {!mLoading && metrics && (
        <div className="grid grid-cols-2 gap-4 lg:grid-cols-4">
          <StatCard label="Total Tasks" value={metrics.totalTasks} color="text-purple-400" />
          <StatCard label="Success Rate" value={metrics.successRate} color="text-green-400" />
          <StatCard label="Avg Duration" value={fmtDuration(metrics.avgDurationMs)} color="text-blue-400" />
          <StatCard label="Failures" value={metrics.failureCount} color="text-red-400" />
        </div>
      )}

      {/* Recent completed goals */}
      <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
        <div className="text-gray-400 text-sm font-medium mb-3 uppercase tracking-wider">Recent Completed Goals</div>
        {recentCompleted.length === 0
          ? <div className="text-gray-600 text-sm">No completed tasks yet.</div>
          : recentCompleted.map(t => (
            <div key={t.id} className="py-2 border-b border-gray-700 last:border-0">
              <div className="flex items-center justify-between">
                <div className="text-sm text-gray-200 truncate max-w-xl">{t.goal}</div>
                <div className="text-xs text-gray-500 ml-4 flex-shrink-0">{fmtTime(t.completedAt)}</div>
              </div>
            </div>
          ))
        }
      </div>

      {/* Top skills */}
      {metrics?.topSkills?.length > 0 && (
        <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
          <div className="text-gray-400 text-sm font-medium mb-3 uppercase tracking-wider">Top Skills</div>
          <div className="space-y-2">
            {metrics.topSkills.map(s => (
              <div key={s.name} className="flex items-center gap-3">
                <span className="text-sm text-gray-300 w-40 truncate">{s.name}</span>
                <div className="flex-1 bg-gray-700 rounded-full h-2">
                  <div className="bg-purple-500 h-2 rounded-full" style={{ width: `${Math.min(100, s.count * 10)}%` }}></div>
                </div>
                <span className="text-xs text-gray-500">{s.count}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function TasksPage({ events }) {
  const [goal, setGoal] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [lastResult, setLastResult] = useState(null);
  const streamRef = useRef(null);

  const runGoal = async () => {
    if (!goal.trim()) return;
    setSubmitting(true);
    setLastResult(null);
    try {
      const r = await fetch(API + '/api/goal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal }),
      });
      const data = await r.json();
      setLastResult(data);
      setGoal('');
    } catch(e) {
      setLastResult({ error: e.message });
    } finally { setSubmitting(false); }
  };

  return (
    <div className="space-y-6">
      <h2 className="text-2xl font-bold text-white">Mission Control — Live Events</h2>

      {/* Goal Input */}
      <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
        <div className="text-gray-400 text-sm font-medium mb-3 uppercase tracking-wider">Run a Goal</div>
        <div className="flex gap-3">
          <input
            className="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
            placeholder='e.g. "Build a REST API for user management"'
            value={goal}
            onChange={e => setGoal(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && !submitting && runGoal()}
          />
          <button
            onClick={runGoal}
            disabled={submitting || !goal.trim()}
            className="bg-purple-600 hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors"
          >
            {submitting ? '⟳ Running...' : '▶ Run Goal'}
          </button>
        </div>
        {lastResult && (
          <div className={`mt-2 text-xs px-3 py-1.5 rounded ${lastResult.error ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300'}`}>
            {lastResult.error ? `Error: ${lastResult.error}` : `✓ Queued — Task ID: ${lastResult.taskId}`}
          </div>
        )}
      </div>

      {/* Live Event Stream */}
      <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
        <div className="px-5 py-3 border-b border-gray-700 flex items-center justify-between">
          <span className="text-gray-400 text-sm font-medium uppercase tracking-wider">Live Event Stream</span>
          <span className="flex items-center gap-1.5 text-xs text-green-400">
            <span className="w-2 h-2 rounded-full bg-green-400 pulse"></span>
            LIVE
          </span>
        </div>
        <div ref={streamRef} className="overflow-y-auto" style={{ maxHeight: '520px' }}>
          {events.length === 0
            ? <div className="text-gray-600 text-sm text-center py-12">Waiting for events...</div>
            : [...events].reverse().map((ev, i) => {
                const cls = classifyEvent(ev.type);
                const colorMap = { success:'border-green-500', failure:'border-red-500', running:'border-yellow-500', info:'border-purple-500' };
                return (
                  <div key={i} className={`event-item px-5 py-3 border-b border-gray-700 last:border-0 slide-in ${colorMap[cls]}`}
                       style={{ borderLeftWidth: '3px', borderLeftStyle: 'solid' }}>
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex items-center gap-2 min-w-0">
                        <span className="text-base flex-shrink-0">{eventIcon(ev.type)}</span>
                        <div className="min-w-0">
                          <span className={`text-xs font-semibold uppercase tracking-wide ${
                            cls==='success'?'text-green-400':cls==='failure'?'text-red-400':cls==='running'?'text-yellow-400':'text-purple-400'
                          }`}>{ev.type.replace(/_/g,' ')}</span>
                          {ev.taskId && <span className="text-gray-600 text-xs ml-2">#{ev.taskId.slice(0,8)}</span>}
                          {ev.payload && (
                            <div className="text-gray-400 text-xs mt-0.5 truncate max-w-xl">
                              {ev.payload.goal ? `"${ev.payload.goal}"` :
                               ev.payload.error ? `Error: ${ev.payload.error}` :
                               ev.payload.action?.type ? `${ev.payload.action.type}` :
                               JSON.stringify(ev.payload).slice(0,120)}
                            </div>
                          )}
                        </div>
                      </div>
                      <div className="text-gray-600 text-xs flex-shrink-0">{fmtTime(ev.timestamp)}</div>
                    </div>
                  </div>
                );
              })
          }
        </div>
      </div>
    </div>
  );
}

function SkillsPage() {
  const { data: skills,     loading,    refresh: refreshSkills }     = useAPI('/api/skills',     30000);
  const { data: benchmarks, refresh: refreshBenchmarks } = useAPI('/api/benchmarks', 30000);
  const [evolving, setEvolving] = useState(false);
  const [evolveResult, setEvolveResult] = useState(null);

  const runEvolve = async () => {
    setEvolving(true);
    setEvolveResult(null);
    try {
      const r = await fetch('/api/evolve', { method: 'POST' });
      const data = await r.json();
      setEvolveResult(data);
      refreshSkills();
      refreshBenchmarks();
    } catch(e) {
      setEvolveResult({ error: e.message });
    } finally {
      setEvolving(false);
    }
  };

  if (loading) return <div className="text-gray-500 text-sm">Loading skills...</div>;

  return (
    <div className="space-y-6">
      {/* Header row */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-bold text-white">Skills Registry</h2>
          <div className="text-gray-400 text-sm mt-1">{skills?.length || 0} skills registered</div>
        </div>
        <button
          onClick={runEvolve}
          disabled={evolving}
          className="bg-green-700 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
        >
          {evolving ? '⟳ Evolving...' : '🧬 Evolve Skills'}
        </button>
      </div>

      {/* Evolve result banner */}
      {evolveResult && (
        <div className={`px-4 py-3 rounded-lg text-sm ${evolveResult.error ? 'bg-red-900/40 text-red-300' : 'bg-green-900/40 text-green-300'}`}>
          {evolveResult.error
            ? `Evolution error: ${evolveResult.error}`
            : `✅ Evolution complete — analyzed: ${evolveResult.skillsAnalyzed}, deployed: ${evolveResult.skillsDeployed}, discarded: ${evolveResult.skillsDiscarded}`
          }
        </div>
      )}

      {/* Skill cards */}
      <div className="grid grid-cols-1 gap-4 lg:grid-cols-2 xl:grid-cols-3">
        {(skills || []).map(skill => {
          const needsImprovement = skill.executionCount >= 3 && skill.successRate < 0.7;
          return (
            <div key={skill.name} className={`bg-gray-800 rounded-xl p-5 border transition-colors ${needsImprovement ? 'border-yellow-700 hover:border-yellow-500' : 'border-gray-700 hover:border-purple-600'}`}>
              <div className="flex items-start justify-between mb-2">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <div className="font-semibold text-white text-sm">{skill.name}</div>
                    {needsImprovement && (
                      <span className="text-xs bg-yellow-900/60 text-yellow-400 px-1.5 py-0.5 rounded font-medium">⚠ needs improvement</span>
                    )}
                  </div>
                  {skill.category && (
                    <span className="text-xs text-purple-400 bg-purple-900/40 px-2 py-0.5 rounded mt-1 inline-block">{skill.category}</span>
                  )}
                </div>
                {skill.executionCount > 0 && (
                  <div className={`text-xs font-bold flex-shrink-0 ml-2 ${skill.successRate >= 0.8 ? 'text-green-400' : skill.successRate >= 0.5 ? 'text-yellow-400' : 'text-red-400'}`}>
                    {(skill.successRate * 100).toFixed(0)}%
                  </div>
                )}
              </div>
              <p className="text-gray-400 text-xs mb-3 line-clamp-2">{skill.description}</p>
              {skill.executionCount > 0 ? (
                <div className="flex items-center gap-3 text-xs text-gray-500">
                  <span>Runs: {skill.executionCount}</span>
                  <span>~{fmtDuration(skill.avgDuration)}</span>
                </div>
              ) : (
                <div className="text-xs text-gray-600">No executions yet</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Evolution History */}
      <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
        <div className="px-5 py-3 border-b border-gray-700">
          <span className="text-gray-400 text-sm font-medium uppercase tracking-wider">Evolution History</span>
        </div>
        {!(benchmarks && benchmarks.length > 0)
          ? <div className="text-gray-600 text-sm text-center py-8">No benchmarks run yet. Click "Evolve Skills" to start.</div>
          : (
            <div className="divide-y divide-gray-700">
              {(benchmarks || []).slice(0, 5).map((b, i) => (
                <div key={i} className="px-5 py-3 flex items-center justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-white font-medium">{b.skillName}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{fmtTime(b.testedAt)}</div>
                  </div>
                  <div className="flex items-center gap-3 text-xs flex-shrink-0">
                    <span className="text-gray-400">{(b.oldSuccessRate * 100).toFixed(0)}%</span>
                    <span className="text-gray-600">→</span>
                    <span className={b.newSuccessRate >= b.oldSuccessRate ? 'text-green-400' : 'text-red-400'}>
                      {(b.newSuccessRate * 100).toFixed(0)}%
                    </span>
                    <span className={`px-2 py-0.5 rounded font-medium ${
                      b.recommendation === 'deploy'  ? 'bg-green-900 text-green-300' :
                      b.recommendation === 'discard' ? 'bg-red-900 text-red-300' :
                                                       'bg-yellow-900 text-yellow-300'
                    }`}>{b.recommendation}</span>
                  </div>
                </div>
              ))}
            </div>
          )
        }
      </div>
    </div>
  );
}

function MemoryPage() {
  const { data: entries, loading } = useAPI('/api/memory', 30000);

  if (loading) return <div className="text-gray-500 text-sm">Loading memory...</div>;

  return (
    <div className="space-y-6">
      <h2 className="text-2xl font-bold text-white">Memory Store</h2>
      <div className="text-gray-400 text-sm">{entries?.length || 0} recent entries</div>
      <div className="space-y-3">
        {(entries || []).length === 0
          ? <div className="text-gray-600 text-sm bg-gray-800 rounded-xl p-5 border border-gray-700 text-center">No memory entries yet.</div>
          : (entries || []).map(entry => (
            <div key={entry.id} className="bg-gray-800 rounded-xl p-5 border border-gray-700 hover:border-gray-600 transition-colors">
              <div className="flex items-start justify-between gap-4">
                <div className="flex-1 min-w-0">
                  <div className="text-sm text-gray-200 mb-1 line-clamp-2">{entry.text}</div>
                  {entry.tags?.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-2">
                      {entry.tags.map(tag => (
                        <span key={tag} className="text-xs bg-gray-700 text-gray-400 px-2 py-0.5 rounded">{tag}</span>
                      ))}
                    </div>
                  )}
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-xs text-gray-600">{fmtTime(entry.createdAt)}</div>
                  <div className="text-xs text-gray-600 font-mono mt-1">{entry.id?.slice(0,12)}...</div>
                </div>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

const AGENT_ROLES_ORDER = ['strategy','research','product','engineering','qa','growth'];
const AGENT_ROLE_ICONS  = { strategy:'🧭', research:'🔬', product:'📋', engineering:'⚙️', qa:'🧪', growth:'📈' };

function agentStatusDot(status) {
  const m = { idle:'bg-gray-500', running:'bg-yellow-400 pulse', completed:'bg-green-400', failed:'bg-red-400' };
  return m[status] || 'bg-gray-500';
}
function projectStatusBadge(status) {
  const m = { planning:'bg-blue-900 text-blue-300', active:'bg-yellow-900 text-yellow-300',
               paused:'bg-gray-700 text-gray-400', completed:'bg-green-900 text-green-300' };
  return `px-2 py-0.5 rounded text-xs font-medium ${m[status] || 'bg-gray-700 text-gray-300'}`;
}

function ProjectCard({ project }) {
  const completedCount = project.agents.filter(a => a.status === 'completed').length;
  const totalAgents    = project.agents.length || 6;
  const progress       = Math.round((completedCount / totalAgents) * 100);

  const agentMap = {};
  for (const a of (project.agents || [])) agentMap[a.role] = a;

  return (
    <div className="bg-gray-800 rounded-xl p-5 border border-gray-700 hover:border-purple-600 transition-colors">
      <div className="flex items-start justify-between mb-2">
        <div className="flex-1 min-w-0 pr-4">
          <div className="text-white font-semibold text-sm truncate">{project.name}</div>
          <div className="text-gray-400 text-xs mt-0.5 line-clamp-2">{project.objective}</div>
        </div>
        <span className={projectStatusBadge(project.status)}>{project.status}</span>
      </div>

      {/* Agent grid */}
      <div className="grid grid-cols-6 gap-2 my-3">
        {AGENT_ROLES_ORDER.map(role => {
          const agent  = agentMap[role] || { status: 'idle' };
          const icon   = AGENT_ROLE_ICONS[role] || '•';
          return (
            <div key={role} className="flex flex-col items-center gap-1" title={`${role}: ${agent.status}`}>
              <div className="text-base">{icon}</div>
              <div className={`w-2.5 h-2.5 rounded-full ${agentStatusDot(agent.status)}`}></div>
              <div className="text-gray-600 text-xs capitalize">{role.slice(0,4)}</div>
            </div>
          );
        })}
      </div>

      {/* Progress bar */}
      <div className="mt-2">
        <div className="flex items-center justify-between text-xs text-gray-500 mb-1">
          <span>{completedCount}/{totalAgents} agents done</span>
          <span>{progress}%</span>
        </div>
        <div className="w-full bg-gray-700 rounded-full h-1.5">
          <div
            className="bg-purple-500 h-1.5 rounded-full transition-all duration-500"
            style={{ width: `${progress}%` }}
          ></div>
        </div>
      </div>

      <div className="text-gray-600 text-xs mt-2">{fmtTime(project.updatedAt)}</div>
    </div>
  );
}

function NewGoalModal({ onClose, onSubmit }) {
  const [goalText, setGoalText] = useState('');
  const [loading, setLoading]   = useState(false);
  const [result, setResult]     = useState(null);

  const handleSubmit = async () => {
    if (!goalText.trim()) return;
    setLoading(true);
    try {
      const r = await fetch('/api/company', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ goal: goalText }),
      });
      const data = await r.json();
      setResult(data);
      setTimeout(() => onClose(), 1500);
    } catch(e) {
      setResult({ error: e.message });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-lg mx-4 shadow-2xl" onClick={e => e.stopPropagation()}>

        <textarea

          rows={4}
          placeholder='e.g. "Build a B2B SaaS for freelance invoice management"'
          value={goalText}
          onChange={e => setGoalText(e.target.value)}
          autoFocus
        />

          <div className={`mt-2 text-xs px-3 py-1.5 rounded ${result.error ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300'}`}>
            {result.error ? `Error: ${result.error}` : `✓ Project started: ${result.projectId}`}

          <button onClick={onClose} className="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-300 py-2 rounded-lg text-sm transition-colors">Cancel</button>

            onClick={handleSubmit}
            disabled={loading || !goalText.trim()}
            className="flex-1 bg-purple-600 hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2 rounded-lg text-sm font-medium transition-colors"
          >
            {loading ? '⟳ Starting...' : '🚀 Launch Company'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── TaskGraphPanel ─────────────────────────────────────────────
function TaskGraphPanel({ goalId }) {
  const [snap, setSnap]   = useState(null);
  const [error, setError] = useState(null);
  const intervalRef       = useRef(null);

  const fetchGraph = useCallback(async () => {
    if (!goalId) return;
    try {
      const r = await fetch('/api/graph/' + goalId);
      if (!r.ok) { setSnap(null); return; }
      setSnap(await r.json());
      setError(null);
    } catch(e) { setError(e.message); }
  }, [goalId]);

  useEffect(() => {
    fetchGraph();
    intervalRef.current = setInterval(fetchGraph, 2000);
    return () => clearInterval(intervalRef.current);
  }, [fetchGraph]);

  if (!goalId)  return null;
  if (error)    return <div className="text-red-400 text-xs p-2">Graph error: {error}</div>;
  if (!snap)    return <div className="text-gray-500 text-xs p-2">No graph snapshot found for this goal.</div>;

  const nodes = snap.graph && snap.graph.nodes ? snap.graph.nodes : [];

  const nodeColor = (status) => {
    const m = {
      pending: { bg:'bg-gray-700',   border:'border-gray-500',   text:'text-gray-300',   dot:'bg-gray-400'  },
      running: { bg:'bg-blue-900',   border:'border-blue-500',   text:'text-blue-200',   dot:'bg-blue-400'  },
      done:    { bg:'bg-green-900',  border:'border-green-500',  text:'text-green-200',  dot:'bg-green-400' },
      failed:  { bg:'bg-red-900',    border:'border-red-500',    text:'text-red-200',    dot:'bg-red-400'   },
      skipped: { bg:'bg-yellow-900', border:'border-yellow-600', text:'text-yellow-200', dot:'bg-yellow-400'},
    };
    return m[status] || m['pending'];
  };

  const statusIcon = (s) => ({ pending:'○', running:'▶', done:'✓', failed:'✗', skipped:'⟫' }[s] || '?');

  return (
    <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
      <div className="flex items-center justify-between mb-4">
        <div className="text-gray-400 text-sm font-medium uppercase tracking-wider">
          Task Graph — {goalId.slice(0,16)}
        </div>
        <div className="text-xs text-gray-500">
          {nodes.length} node{nodes.length !== 1 ? 's' : ''} · auto-refresh 2s
        </div>
      </div>

      <div className="flex flex-wrap gap-3 mb-4">
        {[['pending','gray'],['running','blue'],['done','green'],['failed','red'],['skipped','yellow']].map(function(pair) {
          var s = pair[0];
          var c = nodeColor(s);
          return (
            <div key={s} className="flex items-center gap-1.5">
              <div className={['w-2 h-2 rounded-full', c.dot, s==='running'?'pulse':''].join(' ')}></div>
              <span className={'text-xs ' + c.text}>{s}</span>
            </div>
          );
        })}
      </div>

      <div className="space-y-2">
        {nodes.map(function(node, i) {
          var c = nodeColor(node.status);
          return (
            <div key={node.id || i}
              className={['rounded-lg border px-4 py-3 flex items-start gap-3 transition-all', c.bg, c.border].join(' ')}>
              <div className={['mt-0.5 text-sm font-mono', c.text, node.status==='running'?'pulse':''].join(' ')}>
                {statusIcon(node.status)}
              </div>
              <div className="flex-1 min-w-0">
                <div className={'text-sm font-medium truncate ' + c.text}>
                  {node.description || node.id}
                </div>
                {node.dependsOn && node.dependsOn.length > 0 && (
                  <div className="text-xs text-gray-500 mt-0.5">
                    deps: {node.dependsOn.join(', ')}
                  </div>
                )}
                {node.error && (
                  <div className="text-xs text-red-400 mt-1 truncate">⚠ {node.error}</div>
                )}
                {node.status === 'done' && node.completedAt && (
                  <div className="text-xs text-gray-500 mt-0.5">✓ {fmtTime(node.completedAt)}</div>
                )}
              </div>
              <div className={'text-xs px-2 py-0.5 rounded-full border whitespace-nowrap ' + c.border + ' ' + c.text}>
                {node.action && node.action.type ? node.action.type : '—'}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── WebSocket hook ─────────────────────────────────────────────
function useWebSocket() {
  const [events, setEvents] = useState([]);
  const [wsStatus, setWsStatus] = useState('connecting');
  const wsRef = useRef(null);
  const reconnectTimer = useRef(null);

  const connect = useCallback(() => {
    const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${window.location.host}`);
    wsRef.current = ws;
    setWsStatus('connecting');

    ws.onopen = () => setWsStatus('connected');
    ws.onclose = () => {
      setWsStatus('disconnected');
      reconnectTimer.current = setTimeout(connect, 3000);
    };
    ws.onerror = () => setWsStatus('error');
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'replay' && Array.isArray(data.events)) {
          setEvents(prev => [...prev, ...data.events].slice(-200));
        } else {
          setEvents(prev => [...prev, data].slice(-200));
        }
      } catch {}
    };
  }, []);

  useEffect(() => {
    connect();
    return () => {
      clearTimeout(reconnectTimer.current);
      wsRef.current?.close();
    };
  }, [connect]);

  return { events, wsStatus };
}

// ── SSE hook ───────────────────────────────────────────────────
function useSSE(setLiveEvents) {
  useEffect(() => {
    const es = new EventSource('/api/stream');
    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        setLiveEvents(prev => [{ ...data, _ts: Date.now() }, ...prev].slice(0, 100));
      } catch {}
    };
    es.onerror = () => {};
    return () => es.close();
  }, []);
}

// ── PilotsPage ─────────────────────────────────────────────────
function PilotsPage() {
  const [pilots, setPilots]       = useState([]);
  const [running, setRunning]     = useState({});
  const [results, setResults]     = useState({});
  const [liveEvents, setLive]     = useState([]);

  useSSE(setLive);

  useEffect(() => {
    fetch('/api/pilots')
      .then(r => r.json())
      .then(setPilots)
      .catch(() => setPilots([]));
  }, []);

  const runNow = async (id) => {
    setRunning(p => ({ ...p, [id]: true }));
    try {
      const res  = await fetch(`/api/pilots/${id}/run`, { method: 'POST' });
      const data = await res.json();
      setResults(p => ({ ...p, [id]: data }));
    } catch (err) {
      setResults(p => ({ ...p, [id]: { error: err.message } }));
    } finally {
      setRunning(p => ({ ...p, [id]: false }));
    }
  };

  const statusBadge = (p) => {
    if (p.enabled) return <span className="text-xs px-2 py-0.5 rounded-full bg-green-900 text-green-300">enabled</span>;
    return <span className="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-400">disabled</span>;
  };

  return (
    <div>
      <div className="text-white font-bold text-xl mb-6">🤖 Pilots</div>

      {/* Pilot cards */}
      <div className="grid grid-cols-1 gap-4 mb-8">
        {pilots.length === 0 && (
          <div className="text-gray-500 text-sm">No pilots found. Add JSON configs to config/pilots/</div>
        )}
        {pilots.map(p => (
          <div key={p.id} className="bg-gray-800 border border-gray-700 rounded-xl p-5">
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="flex items-center gap-3 mb-1">
                  <span className="text-white font-semibold">{p.name}</span>
                  {statusBadge(p)}
                  <span className="text-xs text-gray-500">v{p.version}</span>
                </div>
                <div className="text-gray-400 text-sm leading-relaxed">{p.description}</div>
              </div>
              <button
                onClick={() => runNow(p.id)}
                disabled={!!running[p.id]}
                className="ml-4 flex-shrink-0 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 text-white text-xs rounded-lg transition-colors"
              >
                {running[p.id] ? '⏳ Running…' : '▶ Run Now'}
              </button>
            </div>

            <div className="flex flex-wrap gap-4 text-xs text-gray-500 mt-2">
              {p.schedule && <span>⏰ {p.schedule}</span>}
              {p.triggerOnStart && <span>🚀 trigger on start</span>}
              <span>🔧 {p.tools.join(', ')}</span>
              <span>📄 output: {p.outputFormat}</span>
              <span>🔁 max {p.maxIterations} iterations</span>
            </div>

            {results[p.id] && (
              <div className={`mt-3 p-3 rounded-lg text-xs font-mono ${
                results[p.id].status === 'completed'
                  ? 'bg-green-900/40 text-green-300'
                  : results[p.id].error || results[p.id].status === 'failed'
                    ? 'bg-red-900/40 text-red-300'
                    : 'bg-gray-700 text-gray-300'
              }`}>
                {results[p.id].error
                  ? `❌ ${results[p.id].error}`
                  : `✅ Run ${results[p.id].id} — ${results[p.id].status} (${results[p.id].iterationsUsed} iter)`
                }
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Live SSE event log */}
      <div className="bg-gray-800 border border-gray-700 rounded-xl p-4">
        <div className="text-white font-semibold text-sm mb-3">📡 Live Event Stream ({liveEvents.length} events)</div>
        <div className="space-y-1 max-h-64 overflow-y-auto font-mono text-xs">
          {liveEvents.length === 0 && (
            <div className="text-gray-600">Waiting for events… (SSE connected to /api/stream)</div>
          )}
          {liveEvents.map((ev, i) => (
            <div key={i} className="flex gap-2 text-gray-400">
              <span className="text-gray-600 flex-shrink-0">{new Date(ev._ts).toLocaleTimeString()}</span>
              <span className={
                (ev.type||'').includes('fail') || (ev.type||'').includes('error') ? 'text-red-400' :
                (ev.type||'').includes('complete') ? 'text-green-400' : 'text-blue-300'
              }>{ev.type || JSON.stringify(ev)}</span>
              {ev.goal && <span className="text-gray-500 truncate">— {String(ev.goal).slice(0, 60)}</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
